trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
# Node.js version
- name: NODE_VERSION
  value: '20.x'

# Artifactory secrets (set these as secret variables in Azure DevOps)
# ARTIFACTORY_URL → your Artifactory npm repository URL without https://
# Example: your-company.jfrog.io/artifactory/api/npm/ramya-npm
# NPM_TOKEN → your Artifactory npm token

steps:

# 1️⃣ Install Node.js
- task: NodeTool@0
  inputs:
    versionSpec: $(NODE_VERSION)
  displayName: 'Install Node.js'

# 2️⃣ Install npm dependencies
- script: npm install
  displayName: 'Install dependencies'

# 3️⃣ Configure npm for Artifactory (securely using secrets)
- script: |
    echo "registry=https://${ARTIFACTORY_URL}" > .npmrc
    echo "//${ARTIFACTORY_URL}:_authToken=${NPM_TOKEN}" >> .npmrc
  displayName: 'Configure npm for Artifactory'
  env:
    ARTIFACTORY_URL: $(ARTIFACTORY_URL)
    NPM_TOKEN: $(NPM_TOKEN)

# 4️⃣ Debug step (optional, check registry)
- script: npm config get registry
  displayName: 'Check npm registry'

# 5️⃣ Publish package to Artifactory
- script: npm publish
  displayName: 'Publish package'