trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
# Node.js version
- name: NODE_VERSION
  value: '20.x'

# Artifactory secrets (set these as secret variables in Azure DevOps)
# NPM_TOKEN → your Artifactory npm token
# ARTIFACTORY_URL → your Artifactory npm repo URL, e.g., your-company.jfrog.io/artifactory/api/npm/npm-repo/

steps:

# 1. Install Node.js
- task: NodeTool@0
  inputs:
    versionSpec: $(NODE_VERSION)
  displayName: 'Install Node.js'

# 2. Install npm dependencies
- script: npm install
  displayName: 'Install dependencies'

# 3. Configure Artifactory .npmrc with secret URL and token
- script: |
    echo "//${ARTIFACTORY_URL}:_authToken=${NPM_TOKEN}" > .npmrc
    echo "registry=https://${ARTIFACTORY_URL}" >> .npmrc
  displayName: 'Configure npm for Artifactory'
  env:
    NPM_TOKEN: $(NPM_TOKEN)
    ARTIFACTORY_URL: $(ARTIFACTORY_URL)

# 4. Publish package to Artifactory
- script: npm publish
  displayName: 'Publish package'